name: scores

on:
  schedule:
    - cron: '15 * * * *'  # Toutes les heures à H:15
  workflow_dispatch:

concurrency:
  group: scores
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e . requests pandas pyarrow numpy

      - name: Compute scores
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.score
