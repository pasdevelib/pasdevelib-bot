name: scrape

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Empêche deux scrapes de tourner en même temps
concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Run scrape
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.scrape
