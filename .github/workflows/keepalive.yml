name: keepalive

on:
  schedule:
    # Chaque dimanche à 6h UTC — maintient le repo actif
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Keep workflows alive
        uses: actions/github-script@v7
        with:
          script: |
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const wf of workflows.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: wf.id,
                });
                console.log(`Re-enabled: ${wf.name}`);
              }
            }

      - name: Update keepalive timestamp
        run: |
          echo "Last keepalive: $(date -u)" > .github/keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keepalive.txt
          git diff --staged --quiet || git commit -m "chore: keepalive $(date -u +%Y-%m-%d)"
          git push
