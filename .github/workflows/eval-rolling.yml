name: Eval rolling backtest

on:
  schedule:
    # Daily at 06:00 UTC (07:00/08:00 Paris time, after the forecast workflow)
    - cron: "0 6 * * *"
  workflow_dispatch: {} # allow manual trigger

permissions:
  contents: write

jobs:
  eval-rolling:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run rolling backtest (7 days)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.run_backtest_rolling
