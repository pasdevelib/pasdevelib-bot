name: scrape-bordeaux

# Workflow isole pour bordeaux (demande explicite : un bug/plantage sur une
# ville ne doit jamais toucher aux 3 autres). Remplace l'ancien
# scrape-cities.yml qui scrapait les 3 villes dans le meme job — un souci
# d'infra ou un plantage non rattrape sur l'une aurait pu empecher les
# autres de tourner dans la meme execution.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape bordeaux
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e . requests pandas pyarrow

      - name: Scrape bordeaux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.scrape_cities --cities bordeaux
