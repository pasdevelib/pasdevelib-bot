name: consolidate-rennes

on:
  schedule:
    - cron: '50 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidate:
    name: Consolidate rennes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests pandas pyarrow
      - name: Consolidate rennes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.consolidate_cities --cities rennes
