name: flux
on:
  schedule:
    # Tous les jours a 06:00 UTC (apres forecast.yml qui termine vers 5:30-5:45)
    - cron: '0 6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  flux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Compute hourly flux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.flux
