name: scrape-rennes

# Workflow isole pour rennes (meme principe que bordeaux/lyon/toulouse) —
# un bug/plantage sur une ville ne doit jamais toucher aux autres.
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    name: Scrape rennes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e . requests pandas pyarrow

      - name: Scrape rennes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.scrape_cities --cities rennes
