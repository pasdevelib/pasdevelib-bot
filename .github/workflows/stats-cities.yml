name: stats-cities

# Classements quotidiens des stations (vides/pleines/fiables), par ville,
# sur 3 fenetres (jour/semaine/mois). Alimente blog.pasdevelib.app/donnees.
on:
  schedule:
    # 06:00 UTC, apres consolidate-*.yml (03:30) et forecast-cities (05:45)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stats:
    name: Stats toutes villes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests pandas pyarrow
      - name: Compute stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.stats_cities
