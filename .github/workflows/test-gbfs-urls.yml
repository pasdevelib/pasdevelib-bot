name: test-gbfs-urls

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test GBFS URLs
        run: |
          python3 << 'PYEOF'
          import urllib.request, json

          URLS = {
            "bordeaux": [
              "https://transport.data.gouv.fr/gbfs/vcub-bordeaux-metropole/station_status.json",
              "https://data.bordeaux-metropole.fr/gbfs/vcub/station_status.json",
              "https://opendata.bordeaux-metropole.fr/api/explore/v2.1/catalog/datasets/ci_vcub_p/exports/json?limit=3",
              "https://api.jcdecaux.com/vls/v1/stations?contract=Bordeaux&apiKey=a20b32f5b62dabb2adb06a12d97042c47dd6f4ad",
            ],
            "lyon": [
              "https://transport.data.gouv.fr/gbfs/velov/station_status.json",
              "https://download.data.grandlyon.com/files/rdata/jcd_jcdecaux.jcdvelovsimple_2/gbfs/station_status.json",
              "https://api.jcdecaux.com/vls/v1/stations?contract=Lyon&apiKey=a20b32f5b62dabb2adb06a12d97042c47dd6f4ad",
            ],
            "toulouse": [
              "https://transport.data.gouv.fr/gbfs/velo-toulouse/station_status.json",
              "https://api.jcdecaux.com/vls/v1/stations?contract=Toulouse&apiKey=a20b32f5b62dabb2adb06a12d97042c47dd6f4ad",
            ],
          }

          results = {}
          for city, urls in URLS.items():
            results[city] = []
            for url in urls:
              try:
                req = urllib.request.Request(url, headers={"User-Agent": "pasdevelib/1.0", "Accept": "application/json"})
                with urllib.request.urlopen(req, timeout=10) as r:
                  data = r.read().decode(errors="replace")
                  try:
                    parsed = json.loads(data)
                    if isinstance(parsed, list):
                      n = len(parsed)
                    else:
                      n = len(parsed.get("data", {}).get("stations", []))
                    results[city].append({"url": url, "http": r.status, "n": n, "ok": True})
                    print(f"OK {r.status} n={n}: {url}")
                  except:
                    results[city].append({"url": url, "http": r.status, "ok": True, "raw": data[:80]})
                    print(f"OK {r.status} (non-json): {url}")
              except Exception as e:
                results[city].append({"url": url, "ok": False, "err": str(e)[:80]})
                print(f"FAIL: {str(e)[:60]}: {url}")

          with open("gbfs_results.json", "w") as f:
            json.dump(results, f, indent=2)
          print("Done")
          PYEOF

      - name: Commit results
        run: |
          git config user.email "bot@pasdevelib.app"
          git config user.name "pasdevelib-bot"
          git add gbfs_results.json
          git commit -m "test: GBFS URL test results" || true
          git push
