name: test-gbfs-urls

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test GBFS URLs and save results
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, time

          URLS = {
            "bordeaux": [
              "https://transport.data.gouv.fr/gbfs/vcub-bordeaux-metropole/station_status.json",
              "https://data.bordeaux-metropole.fr/gbfs/vcub/station_status.json",
              "https://gbfs.urbansharing.com/bordeaux-metropole.vcub.fr/station_status.json",
              "https://opendata.bordeaux-metropole.fr/api/explore/v2.1/catalog/datasets/ci_vcub_p/exports/json?limit=5",
            ],
            "lyon": [
              "https://transport.data.gouv.fr/gbfs/velov/station_status.json",
              "https://download.data.grandlyon.com/files/rdata/jcd_jcdecaux.jcdvelovsimple_2/gbfs/station_status.json",
              "https://api.jcdecaux.com/vls/v1/stations?contract=Lyon&apiKey=a20b32f5b62dabb2adb06a12d97042c47dd6f4ad",
            ],
            "toulouse": [
              "https://transport.data.gouv.fr/gbfs/velo-toulouse/station_status.json",
              "https://api.jcdecaux.com/vls/v1/stations?contract=Toulouse&apiKey=a20b32f5b62dabb2adb06a12d97042c47dd6f4ad",
            ],
          }

          results = {}
          for city, urls in URLS.items():
            results[city] = []
            for url in urls:
              try:
                req = urllib.request.Request(url, headers={"User-Agent": "pasdevelib-bot/1.0"})
                with urllib.request.urlopen(req, timeout=10) as r:
                  data = r.read().decode(errors='replace')
                  try:
                    parsed = json.loads(data)
                    n = len(parsed.get('data', {}).get('stations', parsed if isinstance(parsed, list) else []))
                    results[city].append({"url": url, "status": r.status, "stations": n, "ok": True})
                    print(f"✅ {city} {r.status} {n} stations: {url}")
                  except:
                    results[city].append({"url": url, "status": r.status, "ok": True, "raw": data[:100]})
                    print(f"✅ {city} {r.status} (non-JSON): {url}")
              except Exception as e:
                results[city].append({"url": url, "status": 0, "ok": False, "error": str(e)})
                print(f"❌ {city}: {e}: {url}")

          with open("gbfs_test_results.json", "w") as f:
            json.dump(results, f, indent=2)
          print("\nResults saved to gbfs_test_results.json")
          PYEOF

      - name: Upload results to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload cities-live gbfs_test_results.json --repo pasdevelib/pasdevelib-bot --clobber || \
          gh release create cities-live --repo pasdevelib/pasdevelib-bot --title "Cities Live" && \
          gh release upload cities-live gbfs_test_results.json --repo pasdevelib/pasdevelib-bot --clobber
