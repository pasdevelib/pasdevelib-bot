name: test-gbfs-urls

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find Toulouse velo datasets
        run: |
          python3 << 'PYEOF'
          import urllib.request, json

          # D'abord chercher les datasets vélo dans le catalog
          url = "https://data.toulouse-metropole.fr/api/explore/v2.1/catalog/datasets?q=velo&limit=20"
          req = urllib.request.Request(url, headers={"Accept":"application/json","User-Agent":"pasdevelib/1.0"})
          with urllib.request.urlopen(req, timeout=10) as r:
            data = json.loads(r.read())
          datasets = data.get("results",[]) or data.get("datasets",[])
          print("Toulouse datasets:")
          for d in datasets:
            did = d.get("dataset_id") or d.get("datasetid") or d.get("id","?")
            print(f"  {did}")

          # Tester les IDs plausibles
          URLS = [
            ("tls_velomalin", "https://data.toulouse-metropole.fr/api/explore/v2.1/catalog/datasets/velo-malin-stations/exports/json?limit=3"),
            ("tls_velov_tls", "https://data.toulouse-metropole.fr/api/explore/v2.1/catalog/datasets/velotoulouse-stations/exports/json?limit=3"),
            ("tls_bicycle", "https://data.toulouse-metropole.fr/api/explore/v2.1/catalog/datasets/bicyclette/exports/json?limit=3"),
          ]
          results = {}
          for name, url in URLS:
            try:
              req = urllib.request.Request(url, headers={"Accept":"application/json","User-Agent":"pasdevelib/1.0"})
              with urllib.request.urlopen(req, timeout=8) as r:
                parsed = json.loads(r.read())
                n = len(parsed) if isinstance(parsed, list) else -1
                results[name] = {"ok":True,"n":n,"s":str(parsed)[:150]}
                print(f"OK n={n}: {name}")
            except Exception as e:
              results[name] = {"ok":False,"err":str(e)}
              print(f"FAIL {name}: {e}")

          with open("gbfs_results.json","w") as f:
            json.dump({"datasets":[d.get("dataset_id") or d.get("datasetid","?") for d in datasets], "tests":results},f,indent=2)
          PYEOF
      - name: Commit
        run: |
          git config user.email "bot@pasdevelib.app"
          git config user.name "pasdevelib-bot"
          git add gbfs_results.json
          git commit -m "test: find toulouse velo datasets" || true
          git push
