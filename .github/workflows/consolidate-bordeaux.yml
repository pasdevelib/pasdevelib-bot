name: consolidate-bordeaux

# Workflow isole pour bordeaux (meme raison que scrape-bordeaux.yml) —
# remplace l'ancien consolidate-cities.yml qui consolidait les 3 villes
# dans la meme boucle Python : un plantage sur une ville pouvait empecher
# les suivantes d'etre traitees dans la meme execution.
on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  consolidate:
    name: Consolidate bordeaux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests pandas pyarrow
      - name: Consolidate bordeaux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.consolidate_cities --cities bordeaux
