name: Backup parquets

on:
  schedule:
    # Daily at 04:00 UTC (06:00 Paris time, after the daily forecast finishes)
    - cron: "0 4 * * *"
  workflow_dispatch: {} # allow manual trigger

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests

      - name: Run backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.backup
