name: watchdog

on:
  schedule:
    - cron: '*/15 * * * *'  # Toutes les 15 min
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests
      - name: Check freshness
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: pasdevelib/pasdevelib-bot
        run: python -m pasdevelib.watchdog
