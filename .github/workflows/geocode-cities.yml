name: geocode-cities

# Enrichit stations_cities.json avec un champ 'zone' (quartier/arrondissement/
# commune) pour les villes secondaires. Rare (hebdo) : la position des
# stations change tres peu, contrairement aux donnees temps reel.
on:
  schedule:
    - cron: '0 4 * * 1'  # lundi 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests pandas pyarrow
      - name: Geocode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.geocode_cities
