name: forecast-cities

# Prevision 7 jours pour les villes secondaires (Bordeaux, Lyon, Toulouse,
# Lille, Rennes, Strasbourg). Reutilise le meme moteur predict.py que
# Paris (cf. pasdevelib/forecast_cities.py). Matrix + fail-fast: false :
# meme principe d'isolation par ville que scrape-*.yml / consolidate-*.yml
# — un plantage sur une ville n'affecte jamais les autres.
on:
  schedule:
    # 05:45 UTC, apres consolidate-*.yml (03:30) et forecast.yml Paris (05:30)
    - cron: '45 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  forecast:
    name: Forecast ${{ matrix.city }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        city: [bordeaux, lyon, toulouse, lille, rennes, strasbourg]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install
        run: pip install -e . requests pandas pyarrow
      - name: Forecast ${{ matrix.city }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.forecast_cities --cities ${{ matrix.city }}
