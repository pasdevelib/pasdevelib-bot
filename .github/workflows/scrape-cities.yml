name: scrape-cities

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      cities:
        description: 'Villes à scraper (ex: bordeaux lyon)'
        required: false
        default: 'bordeaux lyon toulouse'

permissions:
  contents: write

jobs:
  scrape-bordeaux-lyon:
    name: Scrape Bordeaux + Lyon
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e . requests pandas pyarrow

      - name: Scrape Bordeaux + Lyon
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.scrape_cities --cities bordeaux lyon toulouse

      - name: Scrape all (offset 2min)
        run: sleep 120
        continue-on-error: true

      - name: Second scrape
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m pasdevelib.scrape_cities --cities bordeaux lyon toulouse
        continue-on-error: true
